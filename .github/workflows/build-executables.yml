name: Build Executables

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - codex/**
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows x64
            os: windows-latest
            target: win-x64
            artifact: paperweight-windows-x64
            executable: dist/paperweight-win-x64.exe
          - label: macOS Intel
            os: macos-15-intel
            target: macos-x64
            artifact: paperweight-macos-x64
            executable: dist/paperweight-macos-x64
          - label: macOS Apple Silicon
            os: macos-15
            target: macos-arm64
            artifact: paperweight-macos-arm64
            executable: dist/paperweight-macos-arm64
          - label: Linux x64
            os: ubuntu-24.04
            target: linux-x64
            artifact: paperweight-linux-x64
            executable: dist/paperweight-linux-x64
          - label: Raspberry Pi / Linux ARM64
            os: ubuntu-24.04-arm
            target: linux-arm64
            artifact: paperweight-linux-arm64
            executable: dist/paperweight-linux-arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install FFmpeg on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Get-Command ffmpeg -ErrorAction SilentlyContinue)) {
            choco install ffmpeg --yes --no-progress
          }

      - name: Install FFmpeg on macOS
        if: runner.os == 'macOS'
        shell: bash
        run: |
          if ! command -v ffmpeg >/dev/null 2>&1; then
            brew update
            brew install ffmpeg
          fi

      - name: Install FFmpeg on Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: npm ci

      - name: Prepare release-check environment
        shell: bash
        run: |
          cat > .env <<'ENV'
          STATION_NAME=Paperweight CI
          STATION_IDENTITY=creator
          CREATOR_NAME=
          CREATOR_DESC=
          PORT=3000
          VAULT_PATH=./vault
          VAULT_MODE=hybrid
          DASHBOARD_TOKEN=ci-dashboard-token-change-me
          DOWNLOAD_SIGNING_SECRET=ci-download-secret-change-me
          HTTPS=false
          STATION_SLUG=
          STATION_PUBLIC_URL=
          CLOUDFLARE_TUNNEL_TOKEN=
          STRIPE_SECRET_KEY=
          STRIPE_WEBHOOK_SECRET=
          STRIPE_PRICE_SUBSCRIBER=
          STRIPE_PRICE_PRO=
          STRIPE_PRICE_ALL_ACCESS=
          PAYPAL_CLIENT_ID=
          PAYPAL_CLIENT_SECRET=
          PAYPAL_PLAN_PRO=
          PAYPAL_PLAN_ALL_ACCESS=
          PAYPAL_WEBHOOK_ID=
          PAPERWEIGHT_CLOUD=false
          DATA_PATH=./data
          HLS_OUTPUT_PATH=./hls_output
          LOG_PATH=./logs
          DOWNLOAD_TOKEN_TTL_HOURS=48
          ENV

      - name: Build executable
        run: npm run build:exe -- --target ${{ matrix.target }}

      - name: Mark executable bit
        if: runner.os != 'Windows'
        shell: bash
        run: chmod +x "${{ matrix.executable }}"

      - name: Smoke test executable
        run: npm run smoke:exe -- ${{ matrix.executable }}

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.executable }}
          if-no-files-found: error
          retention-days: 14
