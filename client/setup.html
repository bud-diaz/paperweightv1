<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#0a0a0a"/>
<title>Set up your station — Paperweight</title>
<link rel="stylesheet" href="/vendor/fonts/fonts.css"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    min-height: 100dvh;
    background: #080808;
    display: flex; align-items: center; justify-content: center;
    padding: 24px 16px;
    font-family: 'Space Mono', monospace;
    color: rgba(255,255,255,.85);
  }
  #card {
    width: 100%; max-width: 480px;
    background: linear-gradient(160deg,#141414 0%,#0d0d0d 100%);
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 20px;
    box-shadow: 0 32px 80px rgba(0,0,0,.8), 0 0 0 1px rgba(255,255,255,.04), inset 0 1px 0 rgba(255,255,255,.07);
    padding: 28px 26px 26px;
  }
  h1 { font-family: 'DM Serif Display', serif; font-size: 24px; color: #fff; font-weight: 400; }
  .sub { font-size: 9px; letter-spacing: .1em; color: rgba(255,255,255,.35); margin-top: 6px; text-transform: uppercase; }
  fieldset { border: none; margin: 18px 0 0; }
  label { display: block; font-size: 9px; letter-spacing: .08em; color: rgba(255,255,255,.5); text-transform: uppercase; margin-bottom: 6px; }
  .field { margin-bottom: 14px; }
  input[type=text], select {
    width: 100%; background: #0a0a0a; border: 1px solid rgba(255,255,255,.12); border-radius: 8px;
    padding: 9px 10px; color: #fff; font-family: 'Space Mono', monospace; font-size: 12px;
  }
  input[type=text]:focus, select:focus { outline: none; border-color: rgba(255,255,255,.35); }
  .radio-row { display: flex; gap: 14px; }
  .radio-row label { display: flex; align-items: center; gap: 6px; text-transform: none; font-size: 11px; color: rgba(255,255,255,.75); }
  .radio-row input { accent-color: #fff; }
  .hint { font-size: 9px; color: rgba(255,255,255,.3); margin-top: 4px; line-height: 1.4; }
  .creator-fields { display: none; margin-top: 10px; }
  .creator-fields.show { display: block; }
  button {
    width: 100%; margin-top: 8px; padding: 12px;
    background: #fff; color: #0a0a0a; border: none; border-radius: 10px;
    font-family: 'Space Mono', monospace; font-weight: 700; font-size: 11px; letter-spacing: .08em;
    text-transform: uppercase; cursor: pointer;
  }
  button:disabled { opacity: .5; cursor: default; }
  #status { font-size: 10px; margin-top: 12px; line-height: 1.5; min-height: 14px; color: rgba(255,255,255,.5); }
  #status.error { color: #ff6b6b; }
</style>
</head>
<body>
<div id="card">
  <h1>Set up your station</h1>
  <div class="sub">One-time setup &middot; runs locally</div>

  <form id="setup-form">
    <div class="field">
      <label for="stationName">Station name</label>
      <input type="text" id="stationName" name="stationName" placeholder="My Station" required/>
    </div>

    <div class="field">
      <label>Identity</label>
      <div class="radio-row">
        <label><input type="radio" name="identity" value="anonymous" checked/> Anonymous</label>
        <label><input type="radio" name="identity" value="creator"/> Creator brand</label>
      </div>
      <div class="creator-fields" id="creatorFields">
        <div class="field">
          <label for="creatorName">Your name (optional)</label>
          <input type="text" id="creatorName" name="creatorName"/>
        </div>
        <div class="field">
          <label for="creatorDesc">Station description (optional)</label>
          <input type="text" id="creatorDesc" name="creatorDesc"/>
        </div>
      </div>
    </div>

    <div class="field">
      <label for="vaultPath">Vault path</label>
      <input type="text" id="vaultPath" name="vaultPath" placeholder="./vault" value="./vault"/>
      <div class="hint">Where your media lives. Defaults to a "vault" folder next to the app.</div>
    </div>

    <div class="field">
      <label for="vaultMode">Vault mode</label>
      <select id="vaultMode" name="vaultMode">
        <option value="hybrid" selected>Hybrid (recommended)</option>
        <option value="folder">Folder — top-level folders define categories</option>
        <option value="metadata">Metadata — file metadata defines categories</option>
      </select>
    </div>

    <div class="field">
      <label for="cloudflareTunnelToken">Cloudflare Tunnel token (optional)</label>
      <input type="text" id="cloudflareTunnelToken" name="cloudflareTunnelToken" placeholder="Leave blank to skip"/>
      <div class="hint">Hides your IP from listeners. Set up a free tunnel at one.dash.cloudflare.com.</div>
    </div>

    <button type="submit" id="submitBtn">Launch my station</button>
    <div id="status"></div>
  </form>
</div>

<script>
const form = document.getElementById('setup-form');
const submitBtn = document.getElementById('submitBtn');
const statusEl = document.getElementById('status');
const creatorFields = document.getElementById('creatorFields');

form.querySelectorAll('input[name=identity]').forEach(r => {
  r.addEventListener('change', () => {
    creatorFields.classList.toggle('show', form.identity.value === 'creator');
  });
});

async function waitForRestart() {
  for (let attempt = 0; attempt < 60; attempt++) {
    await new Promise(r => setTimeout(r, 1000));
    try {
      const res = await fetch('/api/health', { cache: 'no-store' });
      if (res.ok) {
        window.location.href = '/';
        return;
      }
    } catch {}
  }
  statusEl.textContent = 'Still starting up — refresh this page in a moment.';
}

form.addEventListener('submit', async e => {
  e.preventDefault();
  submitBtn.disabled = true;
  statusEl.classList.remove('error');
  statusEl.textContent = 'Saving configuration...';

  const payload = {
    stationName: form.stationName.value,
    identity: form.identity.value,
    creatorName: form.creatorName.value,
    creatorDesc: form.creatorDesc.value,
    vaultPath: form.vaultPath.value,
    vaultMode: form.vaultMode.value,
    cloudflareTunnelToken: form.cloudflareTunnelToken.value,
  };

  try {
    const res = await fetch('/api/setup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const body = await res.json().catch(() => ({}));
    if (!res.ok) {
      throw new Error(body.error || 'Setup failed.');
    }
    statusEl.textContent = 'Restarting your station...';
    waitForRestart();
  } catch (err) {
    statusEl.classList.add('error');
    statusEl.textContent = err.message;
    submitBtn.disabled = false;
  }
});
</script>
</body>
</html>
